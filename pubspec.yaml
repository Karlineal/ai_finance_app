name: icookie
description: iCookie - 智能记账助手

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  cupertino_icons: ^1.0.2
  
  # 状态管理
  flutter_bloc: ^8.1.6
  provider: ^6.1.1
  equatable: ^2.0.5
  
  # 本地数据库
  sqflite: ^2.3.2
  path: ^1.9.0
  
  # 网络请求
  dio: ^5.4.1
  
  # 图表
  fl_chart: ^0.66.2
  
  # 图片选择（OCR用）
  image_picker: ^1.0.7
  image: ^4.1.3
  
  # 本地存储
  shared_preferences: ^2.2.2
  
  # 工具
  intl: ^0.19.0
  uuid: ^4.3.3
  
  # 权限管理
  permission_handler: ^11.3.0
  
  # 文件路径
  path_provider: ^2.1.2
  
  # CSV 解析
  csv: ^6.0.0
  
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "icon.png"
  adaptive_icon_background: "#0A0E1A"
  adaptive_icon_foreground: "icon.png"

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/icon.png
  
  # fonts:
  #   - family: CustomFont
  #     fonts:
  #       - asset: assets/fonts/CustomFont-Regular.ttf
